name: Sync Webflow → JSON

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      citySlug:
        description: 'Optional city slug to sync only that city (e.g. "tulum"). Empty = sync every city in cities.json.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: core-cms-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync
        env:
          # Shared Webflow API token. If a city's Webflow site lives in a
          # different workspace, set its token via a different secret and
          # reference it in cities.json via `webflowApiTokenEnvVar`.
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          # When set, sync.ts only syncs this city and skips the rest.
          # Webhook receiver passes the city slug it resolved from the
          # source Webflow site ID. Cron runs leave this unset → all cities.
          SYNC_ONLY_CITY: ${{ inputs.citySlug }}
        run: pnpm sync

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          if [ -n "${{ inputs.citySlug }}" ]; then
            COMMIT_MSG="chore: sync ${{ inputs.citySlug }} ($(date -u +%Y-%m-%dT%H:%MZ))"
          else
            COMMIT_MSG="chore: sync all cities ($(date -u +%Y-%m-%dT%H:%MZ))"
          fi
          git commit -m "$COMMIT_MSG"
          git push
